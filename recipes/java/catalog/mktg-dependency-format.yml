type: specs.openrewrite.org/v1beta/recipe
name: com.aoins.mktg.java.GradleDependencyFormat
displayName: MKTG Gradle Dependency Format
description: Standardize Gradle dependency declarations to [type] '[group]:[artifact]:[version]' or '@ext' variant, and strip configuration closures.
recipeList:
  # 'ext' positioning
  - org.openrewrite.text.FindAndReplace:
      find: "\\bext:\\s*(['\"][^'\"]+['\"])\\s*,\\s*((?:group|name|version):\\s*['\"][^'\"]+['\"])"
      replace: "$2, ext: $1"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  - org.openrewrite.text.FindAndReplace:
      find: "\\bext:\\s*(['\"][^'\"]+['\"])\\s*,\\s*((?:group|name|version):\\s*['\"][^'\"]+['\"])"
      replace: "$2, ext: $1"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  - org.openrewrite.text.FindAndReplace:
      find: "\\bext:\\s*(['\"][^'\"]+['\"])\\s*,\\s*((?:group|name|version):\\s*['\"][^'\"]+['\"])"
      replace: "$2, ext: $1"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # 'version' positioning
  - org.openrewrite.text.FindAndReplace:
      find: "\\bversion:\\s*(['\"][^'\"]+['\"])\\s*,\\s*((?:group|name):\\s*['\"][^'\"]+['\"])"
      replace: "$2, version: $1"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  - org.openrewrite.text.FindAndReplace:
      find: "\\bversion:\\s*(['\"][^'\"]+['\"])\\s*,\\s*((?:group|name):\\s*['\"][^'\"]+['\"])"
      replace: "$2, version: $1"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # 'group' positioning
  - org.openrewrite.text.FindAndReplace:
      find: "\\bname:\\s*(['\"][^'\"]+['\"])\\s*,\\s*group:\\s*(['\"][^'\"]+['\"])"
      replace: "group: $2, name: $1"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # group, name, version, ext
  - org.openrewrite.text.FindAndReplace:
      find: "(implementation|api|compileOnly|runtimeOnly|testImplementation|testRuntimeOnly|testCompileOnly|annotationProcessor|kapt|classpath)\\s*\\(?\\s*group:\\s*['\"]([^'\"]+)['\"]\\s*,\\s*name:\\s*['\"]([^'\"]+)['\"]\\s*,\\s*version:\\s*['\"]([^'\"]+)['\"]\\s*,\\s*ext:\\s*['\"]([^'\"]+)['\"]\\s*\\)?(?:\\s*\\{[^{}]*(?:\\{[^{}]*\\}[^{}]*)*\\})?"
      replace: "$1 '$2:$3:$4@$5'"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # group, name, version
  - org.openrewrite.text.FindAndReplace:
      find: "(implementation|api|compileOnly|runtimeOnly|testImplementation|testRuntimeOnly|testCompileOnly|annotationProcessor|kapt|classpath)\\s*\\(?\\s*group:\\s*['\"]([^'\"]+)['\"]\\s*,\\s*name:\\s*['\"]([^'\"]+)['\"]\\s*,\\s*version:\\s*['\"]([^'\"]+)['\"]\\s*\\)?(?:\\s*\\{[^{}]*(?:\\{[^{}]*\\}[^{}]*)*\\})?"
      replace: "$1 '$2:$3:$4'"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # group, name, ext (no version)
  - org.openrewrite.text.FindAndReplace:
      find: "(implementation|api|compileOnly|runtimeOnly|testImplementation|testRuntimeOnly|testCompileOnly|annotationProcessor|kapt|classpath)\\s*\\(?\\s*group:\\s*['\"]([^'\"]+)['\"]\\s*,\\s*name:\\s*['\"]([^'\"]+)['\"]\\s*,\\s*ext:\\s*['\"]([^'\"]+)['\"]\\s*\\)?(?:\\s*\\{[^{}]*(?:\\{[^{}]*\\}[^{}]*)*\\})?"
      replace: "$1 '$2:$3@$4'"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # group, name (no version, no ext)
  - org.openrewrite.text.FindAndReplace:
      find: "(implementation|api|compileOnly|runtimeOnly|testImplementation|testRuntimeOnly|testCompileOnly|annotationProcessor|kapt|classpath)\\s*\\(?\\s*group:\\s*['\"]([^'\"]+)['\"]\\s*,\\s*name:\\s*['\"]([^'\"]+)['\"]\\s*\\)?(?:\\s*\\{[^{}]*(?:\\{[^{}]*\\}[^{}]*)*\\})?"
      replace: "$1 '$2:$3'"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # string notation: parenthesized with a config closure, e.g. implementation('g:a:v') { ... }
  - org.openrewrite.text.FindAndReplace:
      find: "(implementation|api|compileOnly|runtimeOnly|testImplementation|testRuntimeOnly|testCompileOnly|annotationProcessor|kapt|classpath)\\(['\"]([^'\"]+)['\"]\\)\\s*\\{[^{}]*(?:\\{[^{}]*\\}[^{}]*)*\\}"
      replace: "$1 '$2'"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # string notation: parenthesized without a config closure, e.g. implementation('g:a:v')
  - org.openrewrite.text.FindAndReplace:
      find: "(implementation|api|compileOnly|runtimeOnly|testImplementation|testRuntimeOnly|testCompileOnly|annotationProcessor|kapt|classpath)\\(['\"]([^'\"]+)['\"]\\)"
      replace: "$1 '$2'"
      regex: true
      filePattern: "**/*.gradle"

  # string notation: space style with a config closure, e.g. implementation 'g:a:v' { ... }
  - org.openrewrite.text.FindAndReplace:
      find: "(implementation|api|compileOnly|runtimeOnly|testImplementation|testRuntimeOnly|testCompileOnly|annotationProcessor|kapt|classpath)\\s+['\"]([^'\"]+)['\"]\\s*\\{[^{}]*(?:\\{[^{}]*\\}[^{}]*)*\\}"
      replace: "$1 '$2'"
      regex: true
      dotAll: true
      filePattern: "**/*.gradle"

  # string notation: double-quoted without a closure, normalize to single quotes, e.g. implementation "g:a:v"
  - org.openrewrite.text.FindAndReplace:
      find: "(implementation|api|compileOnly|runtimeOnly|testImplementation|testRuntimeOnly|testCompileOnly|annotationProcessor|kapt|classpath)\\s+\"([^\"]+)\""
      replace: "$1 '$2'"
      regex: true
      filePattern: "**/*.gradle"
